{% extends "base.html" %}
{% block title %}{{ display_name }} - Viewer{% endblock %}
{% block content %}
<div class="mb-3 d-flex align-items-center justify-content-between">
    <a href="{{ url_for('books', class_id=class_id, subject_id=subject_id) }}" class="btn-back btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back to Books
    </a>
    <div class="text-end">
        <a href="{{ download_url }}" target="_blank" class="btn-outline-pill px-3 d-inline-flex align-items-center" style="min-height: 38px;">
            <i class="bi bi-download me-1"></i>Download
        </a>
    </div>
</div>

<div class="mb-3 overflow-hidden">
    <h1 class="h4 text-dark mb-1 text-truncate">{{ display_name }}</h1>
    <p class="text-muted small mb-0">{{ class_name }} &bull; {{ subject_name }}{% if group %} &bull; {{ group }}{% endif %}</p>
</div>

<div class="viewer-wrapper">
    <div class="position-relative w-100 rounded overflow-hidden" style="height: 82vh; min-height: 500px;">
        <iframe
            src="{{ pdf_url }}"
            class="w-100 h-100 border-0"
            title="{{ display_name }}"
            allow="autoplay; fullscreen"
            allowfullscreen
        ></iframe>
    </div>
</div>

<div class="text-center mt-3">
    <p class="text-muted small">
        If the viewer doesn't load, 
        <a href="{{ download_url }}" target="_blank">download the PDF</a> instead.
    </p>
</div>
{% endblock %}
